version: '3.8'

services:

  database:
    image: mongo:latest
    container_name: stm-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db 
  app:
    build: .
    container_name: stm-job-portal
    restart: always
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://database:27017/stm_job 
    depends_on:
      - database 

volumes:
  mongo-data: